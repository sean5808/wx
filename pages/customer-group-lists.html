<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCRM 原型 - 客户列表（我的）</title>
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
    <link rel="stylesheet" href="../assets/css/customer-list-mine.css" />
  </head>
  <body data-page="customer-group-lists.html" data-parent-page="customer-management.html" data-root="../">
    <div class="app-shell">
      <div id="app-menu"></div>
      <main class="main-area my-group-page">
        <header class="top-header my-group-header">
          <div class="my-group-header-left">
            <h1 class="header-title">客户管理 / 客群列表</h1>
            <p class="header-meta">最近更新：2026-06-13 08:33</p>
          </div>
          <div class="header-actions">
            <button class="btn">消息</button>
            <button class="btn">帮助</button>
            <button class="btn btn-primary">新建任务</button>
          </div>
        </header>

        <section class="page-content">
          <article class="card my-group-card">
            <div class="list-toolbar">
              <h2 class="section-title">客群列表</h2>
              <div class="toolbar-actions">
                <button class="btn btn-primary">新建客群</button>
              </div>
            </div>

            <table class="table my-group-table">
              <thead>
                <tr>
                  <th>群名称</th>
                  <th>群主</th>
                  <th>群成员数</th>
                  <th>活跃度</th>
                  <th>创建时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>VIP福利1群</td>
                  <td>王经理</td>
                  <td class="num-strong">198</td>
                  <td>
                    <div class="active-cell">
                      <span class="active-bar high" style="--w: 80%"></span>
                      <span class="level high">高</span>
                    </div>
                  </td>
                  <td>2024-01-15</td>
                  <td><a href="#">管理</a></td>
                </tr>
                <tr>
                  <td>母婴交流3群</td>
                  <td>李顾问</td>
                  <td class="num-strong">156</td>
                  <td>
                    <div class="active-cell">
                      <span class="active-bar mid" style="--w: 58%"></span>
                      <span class="level mid">中</span>
                    </div>
                  </td>
                  <td>2024-03-20</td>
                  <td><a href="#">管理</a></td>
                </tr>
                <tr>
                  <td>核心粉丝群</td>
                  <td>张店长</td>
                  <td class="num-strong">89</td>
                  <td>
                    <div class="active-cell">
                      <span class="active-bar low" style="--w: 22%"></span>
                      <span class="level low">低</span>
                    </div>
                  </td>
                  <td>2024-05-01</td>
                  <td><a href="#">管理</a></td>
                </tr>
              </tbody>
            </table>
          </article>
        </section>
      </main>
    </div>
    <script src="../assets/js/menu.js" defer></script>
  </body>
</html>

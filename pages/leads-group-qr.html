<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCRM 原型 - 客群活码</title>
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
    <link rel="stylesheet" href="../assets/css/leads-group-qr.css" />
  </head>
  <body data-page="leads-group-qr.html" data-parent-page="leads-conversion.html" data-root="../">
    <div class="app-shell">
      <div id="app-menu"></div>
      <main class="main-area group-qr-page">
        <header class="top-header group-qr-header">
          <div class="group-qr-header-left">
            <h1 class="header-title">拓客转化 / 客群活码</h1>
            <p class="header-meta">最近更新：2026-06-13 08:33</p>
          </div>
          <div class="header-actions">
            <button class="btn">消息</button>
            <button class="btn">帮助</button>
            <button class="btn btn-primary">新建任务</button>
          </div>
        </header>

        <section class="page-content">
          <article class="card group-list-card">
            <div class="list-toolbar">
              <h2 class="section-title">客群活码</h2>
              <div class="toolbar-actions">
                <button class="btn btn-primary">新建群活码</button>
              </div>
            </div>

            <table class="table group-table">
              <thead>
                <tr>
                  <th>群活码名称</th>
                  <th>关联群聊</th>
                  <th>扫码入群数</th>
                  <th>当前状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>VIP福利群入口</td>
                  <td>VIP福利1群, VIP福利2群</td>
                  <td class="num-strong">2,340</td>
                  <td><span class="status status-on">进行中</span></td>
                  <td><a href="#">详情</a> | <a href="#">停用</a></td>
                </tr>
                <tr>
                  <td>母婴交流群邀请</td>
                  <td>母婴交流1群, 母婴交流2群, 母婴交流3群</td>
                  <td class="num-strong">1,850</td>
                  <td><span class="status status-on">进行中</span></td>
                  <td><a href="#">详情</a> | <a href="#">停用</a></td>
                </tr>
              </tbody>
            </table>
          </article>
        </section>
      </main>
    </div>
    <script src="../assets/js/menu.js" defer></script>
  </body>
</html>

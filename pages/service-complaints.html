<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCRM 原型 - 投诉管理</title>
    <link rel="stylesheet" href="../assets/css/base.css" />

          <div class="complaints-header-left">
            <h1 class="header-title">智能客服 / 投诉管理</h1>
            <p class="header-meta">最近更新：2026-06-13 08:33</p>
          </div>
          <div class="header-actions">
            <button class="btn">消息</button>
            <button class="btn">帮助</button>
            <button class="btn btn-primary">新建任务</button>
          </div>
        </header>

        <section class="page-content">
          <article class="card complaints-list-card">
            <div class="list-toolbar">
              <h2 class="section-title">投诉管理</h2>

                  <th>投诉人</th>

                  <th>投诉原因</th>

              </thead>
              <tbody>
                <tr>
                  <td>张小明</td>
                  <td>李顾问</td>
                  <td>回复态度差，未解决售后问题</td>

                  <td><a href="#">查看</a></td>
                </tr>
                <tr>
                  <td>李美玲</td>
                  <td>陈顾问</td>
                  <td>承诺的优惠未兑现</td>
                  <td>2024-06-11 10:05</td>
                  <td><span class="status status-done">已解决</span></td>
                  <td><a href="#">查看</a></td>
                </tr>
              </tbody>
            </table>
          </article>
        </section>
      </main>

    <script src="../assets/js/menu.js" defer></script>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCRM 原型 - 拓客转化</title>
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
  </head>
  <body data-page="leads-conversion.html" data-root="../">
    <div class="app-shell">
      <div id="app-menu"></div>
      <main class="main-area">
        <header class="top-header">
          <h1 class="header-title">拓客转化</h1>
          <div class="header-actions">
            <button class="btn">线索导入</button>
            <button class="btn btn-primary">创建漏斗</button>
          </div>
        </header>

        <section class="page-content">
          <div class="grid">
            <article class="card"><h2 class="card-title">线索总量</h2><p class="card-value">3,216</p></article>
            <article class="card"><h2 class="card-title">有效线索</h2><p class="card-value">2,104</p></article>
            <article class="card"><h2 class="card-title">成交客户</h2><p class="card-value">482</p></article>
          </div>
          <article class="card section">
            <h2 class="card-title">渠道转化概览</h2>
            <table class="table">
              <thead><tr><th>渠道</th><th>线索数</th><th>转化率</th></tr></thead>
              <tbody>
                <tr><td>企微活码</td><td>1,026</td><td>35.1%</td></tr>
                <tr><td>内容投放</td><td>812</td><td>28.4%</td></tr>
                <tr><td>活动报名</td><td>697</td><td>31.0%</td></tr>
              </tbody>
            </table>
          </article>
        </section>
      </main>
    </div>
    <script src="../assets/js/menu.js" defer></script>
  </body>
</html>

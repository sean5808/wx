<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <body data-page="marketing-campaigns.html" data-root="../">

      <div id="app-menu"></div>

            <button class="btn">活动模板</button>
            <button class="btn btn-primary">新建活动</button>

          <div class="grid">
            <article class="card"><h2 class="card-title">进行中活动</h2><p class="card-value">18</p></article>

              <thead><tr><th>活动名</th><th>状态</th><th>目标客群</th></tr></thead>

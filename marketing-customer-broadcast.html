<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCRM 原型 - 客户群发</title>
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
    <link rel="stylesheet" href="../assets/css/marketing-customer-broadcast.css" />
  </head>
  <body data-page="marketing-customer-broadcast.html" data-parent-page="marketing-campaigns.html" data-root="../">
    <div class="app-shell">
      <div id="app-menu"></div>
      <main class="main-area customer-broadcast-page">
        <header class="top-header customer-broadcast-header">
          <div class="customer-broadcast-header-left">
            <h1 class="header-title">营销活动 / 客户群发</h1>
            <p class="header-meta">最近更新：2026-06-13 08:33</p>
          </div>
          <div class="header-actions">
            <button class="btn">消息</button>
            <button class="btn">帮助</button>
            <button class="btn btn-primary">新建任务</button>
          </div>
        </header>

        <section class="page-content">
          <article class="card broadcast-list-card">
            <div class="list-toolbar">
              <h2 class="section-title">客户群发</h2>
              <div class="toolbar-actions">
                <button class="btn btn-primary">新建群发</button>
              </div>
            </div>

            <table class="table broadcast-table">
              <thead>
                <tr>
                  <th>任务名称</th>
                  <th>发送内容</th>
                  <th>目标客户数</th>
                  <th>已发送数</th>
                  <th>创建时间</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>端午安康问候</td>
                  <td>端午节日祝福+优惠券推送</td>
                  <td>3,500</td>
                  <td>3,450</td>
                  <td>2024-06-12 09:00</td>
                  <td><span class="status status-done">已完成</span></td>
                </tr>
                <tr>
                  <td>夏季新品推荐</td>
                  <td>夏季清凉套装上新通知</td>
                  <td>5,200</td>
                  <td>2,180</td>
                  <td>2024-06-13 10:00</td>
                  <td><span class="status status-sending">发送中</span></td>
                </tr>
              </tbody>
            </table>
          </article>
        </section>
      </main>
    </div>
    <script src="../assets/js/menu.js" defer></script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCRM 原型 - 客群标签</title>
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
    <link rel="stylesheet" href="../assets/css/customer-group-tags.css" />
  </head>
  <body data-page="customer-group-tags.html" data-parent-page="customer-management.html" data-root="../">
    <div class="app-shell">
      <div id="app-menu"></div>
      <main class="main-area customer-group-tags-page">
        <header class="top-header customer-group-tags-header">
          <div class="customer-group-tags-header-left">
            <h1 class="header-title">客户管理 / 客群标签</h1>
            <p class="header-meta">最近更新：2026-06-13 08:33</p>
          </div>
          <div class="header-actions">
            <button class="btn">消息</button>
            <button class="btn">帮助</button>
            <button class="btn btn-primary">新建任务</button>
          </div>
        </header>

        <section class="page-content">
          <div class="group-tag-board-grid">
            <article class="card group-tag-board">
              <div class="board-head">
                <h2 class="board-title">活跃度标签</h2>
                <a href="#" class="new-tag-link">+ 新建标签</a>
              </div>
              <div class="board-list">
                <div class="board-item"><span>高活跃群</span><span>8个群</span></div>
                <div class="board-item"><span>中等活跃群</span><span>12个群</span></div>
                <div class="board-item"><span>低活跃群</span><span>5个群</span></div>
              </div>
            </article>

            <article class="card group-tag-board">
              <div class="board-head">
                <h2 class="board-title">行业分类标签</h2>
                <a href="#" class="new-tag-link">+ 新建标签</a>
              </div>
              <div class="board-list">
                <div class="board-item"><span>母婴类群</span><span>6个群</span></div>
                <div class="board-item"><span>美妆类群</span><span>4个群</span></div>
                <div class="board-item"><span>数码类群</span><span>3个群</span></div>
                <div class="board-item"><span>综合类群</span><span>12个群</span></div>
              </div>
            </article>
          </div>
        </section>
      </main>
    </div>
    <script src="../assets/js/menu.js" defer></script>
  </body>
</html>
